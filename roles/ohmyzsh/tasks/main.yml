---
# tasks file for ohmyzsh

- name: Ensure dependencies are installed
  ansible.builtin.package:
    name:
      - zsh
      - git
    state: present

- name: Include task to get info of {{ ohmyzsh_user }}
  ansible.builtin.include_tasks: get_user_info.yml
  # This sets the __ohmyzsh_user_info variable

- name: Init and configure GIT
  ansible.builtin.shell:  # noqa command-instead-of-module
    cmd: >
      git init {{ __ohmyzsh_user_info.home }}/.oh-my-zsh
      && cd {{ __ohmyzsh_user_info.home }}/.oh-my-zsh
      && git config core.eol lf
      && git config core.autocrlf false
      && git config fsck.zeroPaddedFilemode ignore
      && git config fetch.fsck.zeroPaddedFilemode ignore
      && git config receive.fsck.zeroPaddedFilemode ignore
      && git config oh-my-zsh.remote origin
      && git config oh-my-zsh.branch master
      && git remote add origin {{ ohmyzsh_repo_url }}
      && git fetch --depth=1 origin
      && git checkout -b master origin/master
    creates: "{{ __ohmyzsh_user_info.home }}/.oh-my-zsh/.git"

- name: Install plugins
  ansible.builtin.git:  # noqa latest[git]
    dest: "{{ __ohmyzsh_user_info.home }}/.oh-my-zsh/custom/plugins/{{ item.dest }}"
    repo: "{{ item.repo }}"
    depth: 1
    update: false
  loop:
    - dest: zsh-autosuggestions
      repo: "{{ ohmyzsh_plugin_autosuggestions_repo_url }}"
    - dest: zsh-completions
      repo: "{{ ohmyzsh_plugin_completions_repo_url }}"
    - dest: zsh-syntax-highlighting
      repo: "{{ ohmyzsh_plugin_syntax_highlighting_repo_url }}"

- name: Install mh-hostname custom theme
  ansible.builtin.template:
    src: templates/mh-hostname.zsh-theme
    dest: "{{ __ohmyzsh_user_info.home }}/.oh-my-zsh/custom/themes/mh-hostname.zsh-theme"
    owner: "{{ ohmyzsh_user }}"
    group: "{{ ohmyzsh_user }}"
    mode: '0644'

- name: Ensure ~/.common_profile and ~/.z exists
  ansible.builtin.file:
    path: "{{ ohmyzsh_necessary_files_item }}"
    state: touch
    owner: "{{ ohmyzsh_user }}"
    group: "{{ ohmyzsh_user }}"
    mode: '0644'
    access_time: preserve
    modification_time: preserve
  loop:
    - "{{ __ohmyzsh_user_info.home }}/.common_profile"
    - "{{ __ohmyzsh_user_info.home }}/.z"
  loop_control:
    loop_var: ohmyzsh_necessary_files_item

# Must use force because role epfl_si.rhel.user creates an empty .zshrc file
- name: Create the .zshrc file
  ansible.builtin.template:
    src: templates/zshrc.j2
    dest: "{{ __ohmyzsh_user_info.home }}/.zshrc"
    owner: "{{ ohmyzsh_user }}"
    group: "{{ ohmyzsh_user }}"
    mode: '0644'
    force: true
    backup: true
